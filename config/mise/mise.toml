[settings]
cache_prune_age = "7d"
experimental = true
gpg_verify = true
jobs = 24
idiomatic_version_file_enable_tools = ["rust"]
disable_backends = ["asdf"]
python.uv_venv_auto = true
npm.package_manager = "bun"

