# Melange dark tmux theme
# Palette refs:
# - https://github.com/OwlfaceGames/melangey_tmux/blob/master/melangey-tmux.conf
# - https://github.com/savq/melange-nvim/blob/master/term/ghostty/melange_dark

# Melangey palette
# bg=#292522 bg_light=#34302C fg=#C1A78E yellow=#EBC06D cyan=#89B3B6
# comment=#867462 blue=#A3A9CE magenta=#CF9BC2 red=#D47766 light=#ECE1D7

set-option @tmux_theme "melange-dark"
set-option status-position top
set-option status on
set-option status-justify left
set-option status-style "bg=#292522,fg=#C1A78E"
set-option status-left-length 100
set-option status-left "#{?client_prefix,#[bg=#D47766],#[bg=#89B3B6]}#[fg=#292522,bold] #S #[bg=#292522] "
set-option status-right-length 400
set-option status-right "#{?#{m:*zed/*,#{session_name}},,#[align=absolute-right]#[bg=#292522] #[bg=#34302C#,fg=#C1A78E#,bold] #(~/.config/tmux/shorten-path '#{pane_current_path}') }"
# set-option status-right "#[align=absolute-centre,fg=#C1A78E,bold]#{?#{==:#T,#H},,#T @ }#(~/.config/tmux/shorten-path '#{pane_current_path}') #[align=right]"
set-option window-status-format "#[fg=#C1A78E,bg=#34302C] #I:#W "
set-option window-status-current-format "#[bg=#EBC06D,fg=#292522,bold] #I:#W "
set-option window-status-style "fg=#C1A78E,bg=#34302C"
set-option window-status-current-style "fg=#292522,bg=#EBC06D,bold"
set-option window-status-activity-style "fg=#C1A78E,bg=#34302C"
set-option window-status-bell-style "fg=#C1A78E,bg=#34302C"
set-option window-status-last-style "fg=#C1A78E,bg=#34302C"
set-option window-status-separator ""
set-option message-style "bg=#EBC06D,fg=#292522,bold"
set-option message-command-style "bg=#CF9BC2,fg=#292522,bold"

run-shell -b 'session="#{session_name}"; tmux list-windows -t "$session" -F "##{window_id}" | while IFS= read -r w; do tmux set-window-option -q -u -t "$w" window-status-format; tmux set-window-option -q -u -t "$w" window-status-current-format; tmux set-window-option -q -t "$w" popup-border-lines heavy; tmux set-window-option -q -t "$w" popup-style "bg=#292522,fg=#C1A78E"; tmux set-window-option -q -t "$w" popup-border-style "fg=#89B3B6"; tmux set-window-option -q -t "$w" pane-border-style "fg=#867462"; tmux set-window-option -q -t "$w" pane-active-border-style "fg=#89B3B6"; tmux set-window-option -q -t "$w" pane-border-status top; tmux set-window-option -q -t "$w" pane-border-indicators both; tmux set-window-option -q -t "$w" pane-border-lines simple; tmux set-window-option -q -t "$w" pane-border-format ""; tmux set-window-option -q -t "$w" mode-style "bg=#A3A9CE,fg=#292522,bold"; done'
